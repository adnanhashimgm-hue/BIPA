<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تقديم طلب ترخيص</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background:#f5f7fb;
    padding:25px;
    color:#0b2f6b;
}

/* MAIN CONTAINER */

.page{
    background:#fff;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
    min-height:95vh;
    position:relative;
}

/* TOP SECTION */

.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:40px 50px 20px;
}

/* STEPS */

.steps{
    display:flex;
    align-items:center;
    gap:18px;
    margin-top:40px;
}

.step{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.circle{
    width:56px;
    height:56px;
    border-radius:50%;
    border:2px solid #b9c0d0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:700;
    color:#4b5563;
    background:#fff;
}

.circle.active{
    background:#032b8c;
    color:#fff;
    border:none;
}

.step span{
    font-size:22px;
    font-weight:600;
}

.line{
    width:90px;
    height:3px;
    background:#b9c0d0;
    margin-bottom:45px;
}

/* HEADER RIGHT */

.header-right{
    display:flex;
    align-items:flex-start;
    gap:20px;
}

.logo img{
    width:110px;
}

.header-text{
    text-align:right;
}

.header-text h2{
    font-size:38px;
    line-height:1.6;
    margin-bottom:20px;
}

.header-text p{
    font-size:24px;
    color:#555;
    line-height:1.8;
}

/* FORM SECTION */

.form-section{
    padding:10px 50px 50px;
}

.form-box{
    border:1px solid #e2e8f0;
    border-radius:24px;
    padding:40px;
}

.form-title{
    text-align:right;
    margin-bottom:35px;
}

.form-title h3{
    font-size:42px;
    margin-bottom:10px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

/* INPUT */

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:12px;
    font-size:24px;
    font-weight:600;
}

.form-group input,
.form-group select{
    height:74px;
    border:1px solid #d8deea;
    border-radius:16px;
    padding:0 20px;
    font-size:22px;
    outline:none;
    transition:0.3s;
    background:#fff;
}

.form-group input:focus,
.form-group select:focus{
    border-color:#2563eb;
}

/* BUTTONS */

.buttons{
    margin-top:45px;
    display:flex;
    gap:25px;
    justify-content:center;
}

.btn{
    width:260px;
    height:76px;
    border-radius:16px;
    font-size:28px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.btn-primary{
    background:#032b8c;
    color:#fff;
    border:none;
}

.btn-primary:hover{
    background:#0f46c7;
}

.btn-outline{
    background:#fff;
    color:#032b8c;
    border:2px solid #032b8c;
}

.btn-outline:hover{
    background:#f2f6ff;
}

/* BOTTOM IMAGE EFFECT */

.bottom-wave{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:160px;
    background:
    linear-gradient(to top,rgba(150,220,255,.5),transparent),
    url('https://images.unsplash.com/photo-1518837695005-2083093ee35b?q=80&w=1600&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    opacity:.4;
}

/* RESPONSIVE */

@media(max-width:1200px){

    .top{
        flex-direction:column;
        gap:40px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .steps{
        flex-wrap:wrap;
    }

}

</style>

</head>

<body>

<div class="page">

    <!-- TOP -->

    <div class="top">

        <!-- STEPS -->

        <div class="steps">

            <div class="step">

                <div class="circle active">1</div>

                <span>البيانات الأساسية</span>

            </div>

            <div class="line"></div>

            <div class="step">

                <div class="circle">2</div>

                <span>الموقع</span>

            </div>

            <div class="line"></div>

            <div class="step">

                <div class="circle">3</div>

                <span>المستندات</span>

            </div>

            <div class="line"></div>

            <div class="step">

                <div class="circle">4</div>

                <span>المراجعة</span>

            </div>

            <div class="line"></div>

            <div class="step">

                <div class="circle">5</div>

                <span>إرسال الطلب</span>

            </div>

        </div>

        <!-- HEADER -->

        <div class="header-right">

            <div class="header-text">

                <h2>
                    مملكة البحرين<br>
                    منصة التراخيص الذكية<br>
                    للاستزراع المائي
                </h2>

                <p>
                    تقديم طلب ترخيص<br>
                    يرجى تعبئة البيانات المطلوبة لتقديم طلب ترخيص
                    للاستزراع المائي
                </p>

            </div>

            <div class="logo">

                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Coat_of_arms_of_Bahrain.svg/800px-Coat_of_arms_of_Bahrain.svg.png">

            </div>

        </div>

    </div>

    <!-- FORM -->

    <div class="form-section">

        <div class="form-box">

            <div class="form-title">

                <h3>البيانات الأساسية</h3>

            </div>

            <div class="form-grid">

                <!-- RIGHT -->

                <div class="form-group">

                    <label>اسم مقدم الطلب</label>

                    <input type="text" placeholder="أدخل الاسم الكامل">

                </div>

                <!-- LEFT -->

                <div class="form-group">

                    <label>رقم الهوية / السجل التجاري</label>

                    <input type="text" placeholder="أدخل رقم الهوية أو السجل التجاري">

                </div>

                <!-- RIGHT -->

                <div class="form-group">

                    <label>نوع مقدم الطلب</label>

                    <select>

                        <option>اختر نوع مقدم الطلب</option>

                        <option>فرد</option>

                        <option>شركة</option>

                    </select>

                </div>

                <!-- LEFT -->

                <div class="form-group">

                    <label>رقم الهاتف</label>

                    <input type="text" placeholder="أدخل رقم الهاتف">

                </div>

                <!-- RIGHT -->

                <div class="form-group">

                    <label>البريد الإلكتروني</label>

                    <input type="email" placeholder="أدخل البريد الإلكتروني">

                </div>

                <!-- LEFT -->

                <div class="form-group">

                    <label>العنوان</label>

                    <input type="text" placeholder="أدخل العنوان التفصيلي">

                </div>

            </div>

            <!-- BUTTONS -->

            <div class="buttons">

        <a href="request2.html">

    <button class="btn btn-primary">
        التالي
    </button>

<a href="index.html">

    <button class="btn btn-outline">
        خروج
    </button>

</a>

            </div>

        </div>

    </div>

    <!-- BOTTOM EFFECT -->

   
</div>

</body>
</html>
