<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تحديد الموقع الجغرافي</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background:#f5f7fb;
    padding:20px;
    color:#0b2f6b;
}

.page{
    background:#fff;
    border-radius:28px;
    overflow:hidden;
    min-height:95vh;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
    padding:35px;
}

/* TOP */

.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:30px;
}

.back-btn{
    background:#fff;
    border:2px solid #dbe2f0;
    border-radius:16px;
    padding:14px 24px;
    font-size:24px;
    font-weight:700;
    cursor:pointer;
    color:#032b8c;
}

.back-btn:hover{
    background:#f2f6ff;
}

/* TITLE */

.title{
    text-align:center;
    flex:1;
}

.title h1{
    font-size:52px;
    line-height:1.5;
    margin-bottom:10px;
}

.title p{
    font-size:26px;
    color:#555;
}

/* LOGO */

.logo{
    text-align:center;
}

.logo img{
    width:110px;
}

.logo h2{
    font-size:30px;
    line-height:1.7;
}

/* CONTENT */

.content{
    display:grid;
    grid-template-columns:1fr 1.2fr;
    gap:35px;
    margin-top:30px;
}

/* SEARCH */

.search-box{
    position:relative;
    margin-bottom:25px;
}

.search-box input{
    width:100%;
    height:70px;
    border:1px solid #d9deea;
    border-radius:16px;
    padding:0 70px 0 20px;
    font-size:22px;
}

.search-icon{
    position:absolute;
    right:22px;
    top:50%;
    transform:translateY(-50%);
    font-size:28px;
}

/* STEPS */

.steps{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:35px;
}

.step{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.circle{
    width:54px;
    height:54px;
    border-radius:50%;
    border:2px solid #bcc6d8;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:700;
}

.circle.active{
    background:#2563eb;
    border:none;
    color:#fff;
}

.line{
    width:70px;
    height:3px;
    background:#bcc6d8;
    margin-bottom:45px;
}

.step span{
    font-size:20px;
    font-weight:600;
}

/* FORM */

.form-title{
    font-size:36px;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-size:22px;
    font-weight:600;
}

.form-group input,
.form-group select{
    width:100%;
    height:70px;
    border:1px solid #d9deea;
    border-radius:16px;
    padding:0 20px;
    font-size:20px;
}

/* BUTTONS */

.buttons{
    display:flex;
    gap:20px;
    margin-top:35px;
}

.btn{
    flex:1;
    height:72px;
    border-radius:16px;
    font-size:26px;
    font-weight:700;
    cursor:pointer;
}

.primary{
    background:#032b8c;
    color:#fff;
    border:none;
}

.outline{
    background:#fff;
    color:#032b8c;
    border:2px solid #032b8c;
}

/* MAP */

.map-box{
    position:relative;
    border-radius:24px;
    overflow:hidden;
    min-height:800px;

    background:
    linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.15)),
    url('https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&w=1600&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
}

/* DRAW AREA */

.draw-shape{
    position:absolute;
    top:120px;
    left:140px;
    width:450px;
    height:350px;
    background:rgba(0,82,255,.45);
    border:5px solid #fff;
    clip-path:polygon(20% 5%,90% 15%,95% 60%,65% 90%,15% 80%,5% 30%);
}

/* MAP TOOLS */

.tools{
    position:absolute;
    top:35px;
    left:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.tool{
    width:60px;
    height:60px;
    background:#fff;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

/* LOCATION CARD */

.location-card{
    position:absolute;
    bottom:30px;
    right:30px;
    width:420px;
    background:#fff;
    border-radius:22px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.location-card h3{
    font-size:34px;
    margin-bottom:25px;
}

.location-card p{
    font-size:24px;
    margin-bottom:15px;
}

.confirm-btn{
    width:100%;
    height:72px;
    border:none;
    border-radius:16px;
    background:#032b8c;
    color:#fff;
    font-size:28px;
    font-weight:700;
    cursor:pointer;
    margin-top:20px;
}

/* RESPONSIVE */

@media(max-width:1300px){

    .content{
        grid-template-columns:1fr;
    }

    .top{
        flex-direction:column;
        gap:30px;
    }

    .steps{
        flex-wrap:wrap;
    }

}

</style>

</head>

<body>

<div class="page">

    <!-- TOP -->

    <div class="top">

        <button class="back-btn">
            ← العودة
        </button>

        <div class="title">

            <h1>
                شاشة تحديد الموقع الجغرافي<br>
                باستخدام الخرائط الذكية (GIS)
            </h1>

            <p>
                حدد موقع المزرعة على الخريطة
            </p>

        </div>

        <div class="logo">

          
<img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Bahrain_sat.png">

            <h2>
                مملكة البحرين<br>
                منصة التراخيص الذكية<br>
                للاستزراع المائي
            </h2>

        </div>

    </div>

    <!-- CONTENT -->

    <div class="content">

        <!-- LEFT -->

        <div>

            <div class="search-box">

                <span class="search-icon">🔍</span>

                <input type="text" placeholder="ابحث عن موقع">

            </div>

            <!-- STEPS -->

            <div class="steps">

                <div class="step">
                    <div class="circle">1</div>
                    <span>البيانات الأساسية</span>
                </div>

                <div class="line"></div>

                <div class="step">
                    <div class="circle active">2</div>
                    <span>الموقع</span>
                </div>

                <div class="line"></div>

                <div class="step">
                    <div class="circle">3</div>
                    <span>المستندات</span>
                </div>

                <div class="line"></div>

                <div class="step">
                    <div class="circle">4</div>
                    <span>المراجعة</span>
                </div>

                <div class="line"></div>

                <div class="step">
                    <div class="circle">5</div>
                    <span>إرسال الطلب</span>
                </div>

            </div>

            <!-- FORM -->

            <h2 class="form-title">
                البيانات الأساسية
            </h2>

<div class="form-group">

    <label>خط العرض</label>

    <input type="text" placeholder="أدخل خط العرض">

</div>

<div class="form-group">

    <label>خط الطول</label>

    <input type="text" placeholder="أدخل خط الطول">

</div>

<div class="form-group">

    <label>عنوان الموقع</label>

    <input type="text" placeholder="أدخل عنوان الموقع">

</div>


            <!-- BUTTONS -->

            <div class="buttons">

                <button class="btn primary">
                    التالي
                </button>

               <a href="request1.html" style="flex:1">

    <button class="btn outline" style="width:100%">
        رجوع
    </button>

</a>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="map-box">

            <div class="draw-shape"></div>

            <!-- TOOLS -->

            <div class="tools">

                <div class="tool">＋</div>

                <div class="tool">－</div>

                <div class="tool">✋</div>

                <div class="tool">✏️</div>

                <div class="tool">🗑️</div>

            </div>

            <!-- LOCATION -->

            <div class="location-card">

                <h3>
                    إحداثيات الموقع
                </h3>

                <p>
                    خط العرض:
                    26.123456
                </p>

                <p>
                    خط الطول:
                    50.654321
                </p>

                <button class="confirm-btn">
                    تأكيد الموقع
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
